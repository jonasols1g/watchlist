<!doctype html>
<html lang="no">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <!--
      Content-Security-Policy injiseres kun ved `vite build` av
      csp-meta-tag-pluginet i vite.config.ts (se kommentar der for
      begrunnelse). Injiseres den statisk her i stedet, blokkerer den
      Vites dev-server, som bruker inline <style>-tagger for HMR.
    -->
    <title>Streamie</title>
    <!--
      Google Fonts (CineFind-temaet, fase 11, se
      docs/design.md#visuelt-tema-cinefind-fase-11): Space Grotesk for
      overskrifter/wordmark, Manrope for brødtekst/UI. CSP-en i
      vite.config.ts er utvidet med style-src/font-src for disse to
      domenene tilsvarende.
    -->
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@600;700&family=Manrope:wght@400;500;600;700;800&display=swap"
      rel="stylesheet"
    />
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
